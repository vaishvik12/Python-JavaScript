<body>

  <script>
    let marks = 89;
    let grade = '';

    if (marks >= 90) {
      grade = 'A+';
    } else if (marks >= 85 && marks < 90) {
      grade = 'A';
    } else if (marks >= 80 && marks < 85){
      grade = 'B+';
    } else if (marks >= 70 && marks < 80){
      grade = 'B';
    } else {
      grade = 'F';
    }
    console.log(`You got ${grade}`);


  </script>
</body>
