  <script>
    let hour = 16;
    const name = "Vaishvik";
    if(hour >= 6 && hour < 12){
      hour = `Good Morning ${name}`;
    }else if(hour >= 12 && hour < 17){
      hour = `Good Afternoon ${name}`;
    }else{
      hour = `Good night ${name}`;
    }
    console.log(hour);
  </script>
