<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    const coffee = 5;
    const bagles = 3 * 2;
    const soup = 9;
    const cost = bagles + coffee + soup;
    const tax = 0.1;
    const taxOnFood = cost * tax;
    const totalCost = tax + cost;
    console.log(`Cost of food: $${cost}`);
    console.log(`Tax(10%): $${taxOnFood}`);
    console.log(`Total cost: $${totalCost.toFixed(2)}`);

  </script>
</body>
</html>
