<body>

  <h2>Cart Quantity</h2>

  <button onClick = 
  "console.log(`Cart quantity: ${cartQuantity}`);">

  <button onClick = "
  //cartQuantity = cartQuantity + 1;

   console.log(`Cart quantity: ${cartQuantity}`);
  ">Add to Cart</button>

  <button 
   onClick = "
   cartQuantity += 2;  
   console.log(`Cart quantity: ${cartQuantity}`);

  <button
   onClick = "
   cartQuantity += 3;  
   console.log(`Cart quantity: ${cartQuantity}`);

    <button

   onClick = "

   onClick = "

   console.log(`Cart quantity: ${cartQuantity}`);

      <button

   cartQuantity -= 2;

  <button
   onClick = "
   cartQuantity -= 3;  
   console.log(`Cart quantity: ${cartQuantity}`);

  <button
  onClick = "
    cartQuantity = 0;
